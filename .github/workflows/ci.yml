# Swift CI workflow
# Generated by xcb

name: Swift

on:
  push:
  pull_request:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/checkout@v4
      - name: Trust plugins
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - name: Build (macOS)
        run: swift build -v
      - name: Test (macOS)
        run: swift test -v

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/checkout@v4
      - name: Trust plugins
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - name: Create iOS destination
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          TOOLCHAIN_BIN=$(dirname $(xcrun --find swiftc))
          IOS_VERSION=$(xcrun --sdk iphoneos --show-sdk-version)
          cat > .ios-destination.json << EOF
          {
              "version": 1,
              "sdk": "$SDK_PATH",
              "toolchain-bin-dir": "$TOOLCHAIN_BIN",
              "target": "arm64-apple-ios$IOS_VERSION",
              "extra-cc-flags": [],
              "extra-swiftc-flags": [],
              "extra-cpp-flags": []
          }
          EOF
      - name: Build (iOS)
        run: swift build -v --destination .ios-destination.json

  lint:
    runs-on: macos-latest
    if: true
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --strict
